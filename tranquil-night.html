<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Tranquil Night — FATA</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap inner">
      <a class="brand" href="index.html">FATA</a>
      <nav class="nav">
        <a href="index.html#projects">Projects</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact" class="cta">Contact</a>
      </nav>
    </div>
  </header>
  <main class="wrap p-hero">
    <div class="breadcrumb"><a href="index.html#projects" style="opacity:.9">Projects</a> / A Tranquil Night</div>
    <h1 class="p-title">A Tranquil Night</h1>
    <div class="pill" style="display:inline-flex;margin:10px 0 14px">静夜思</div>
    <p class="p-sub"><strong style="font-weight:500;letter-spacing:.08em">2025</strong> · Collection · Draping · Structure · Embroidery · Textile Development</p>
    <div class="hero-shot">
      <img src="page_06.jpg" alt="A Tranquil Night hero" />
    </div>
    <section class="section" style="padding-top:40px">
      <h2 class="h2">Editorial Pages</h2>
      <p class="note">Click any image to view full screen. Use ← → to navigate.</p>
      <div class="gallery" id="gallery">
        <!-- images injected by script -->
      </div>
    </section>
  </main>
  <div class="lb" aria-hidden="true">
    <div class="lb-inner">
      <div class="lb-bar">
        <div class="lb-count">1 / 1</div>
        <div style="display:flex; gap:10px">
          <button class="lb-btn lb-prev">←</button>
          <button class="lb-btn lb-next">→</button>
          <button class="lb-btn lb-close">Close</button>
        </div>
      </div>
      <div class="lb-img"><img alt="Full image"></div>
    </div>
  </div>
  <script>
    const isEn = new URLSearchParams(location.search).get('lang') === 'en';
    const images = isEn
      ? [
          { src: 'en_01.jpg', alt: 'A Tranquil Night — concept' },
          { src: 'en_02.jpg', alt: 'A Tranquil Night — collection look' },
          { src: 'en_03.jpg', alt: 'A Tranquil Night — draping + structure' },
          { src: 'en_04.jpg', alt: 'A Tranquil Night — fabric + embroidery' },
          { src: 'en_05.jpg', alt: 'A Tranquil Night — final look' },
        ]
      : [
          { src: 'page_02.jpg', alt: 'A Tranquil Night page 2' },
          { src: 'page_03.jpg', alt: 'A Tranquil Night page 3' },
          { src: 'page_04.jpg', alt: 'A Tranquil Night page 4' },
          { src: 'page_05.jpg', alt: 'A Tranquil Night page 5' },
          { src: 'page_06.jpg', alt: 'A Tranquil Night page 6' },
        ];
    const gallery = document.getElementById('gallery');
    images.forEach(({ src, alt }) => {
      gallery.innerHTML += `<div class="gi" data-full="${src}"><img src="${src}" alt="${alt}"></div>`;
    });
  </script>
  <script src="main.js"></script>
</body>
</html>
