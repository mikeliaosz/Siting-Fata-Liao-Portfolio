<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume — FATA</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .resume-page {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }
    .resume-page h2 {
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      opacity: .45;
      margin-bottom: 48px;
      text-align: center;
    }
    .resume-cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .resume-card {
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 4px;
      padding: 40px 36px;
      width: 240px;
      text-align: center;
      text-decoration: none;
      color: #e8e2d9;
      transition: background .2s, border-color .2s, transform .2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .resume-card:hover {
      background: rgba(255,255,255,.06);
      border-color: rgba(255,255,255,.4);
      transform: translateY(-4px);
    }
    .resume-card .icon {
      font-size: 36px;
      opacity: .7;
    }
    .resume-card .lang {
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      opacity: .45;
    }
    .resume-card .title {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: .06em;
    }
    .resume-card .action {
      margin-top: 8px;
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,.25);
      padding: 6px 16px;
      border-radius: 30px;
      opacity: .7;
    }
    .dl-bar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(10,10,10,.92);
      backdrop-filter: blur(12px);
      padding: 10px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .dl-bar a.back {
      font-size: 13px; opacity: .55; color: #e8e2d9; text-decoration: none;
    }
    .dl-bar a.back:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="dl-bar">
    <a class="back" href="index.html">← Back to Portfolio</a>
  </div>

  <div class="resume-page">
    <h2>Resume · 简历</h2>
    <div class="resume-cards">

      <a class="resume-card" href="sitong（fata）liao resume.pdf" target="_blank">
        <div class="icon">📄</div>
        <div class="lang">English</div>
        <div class="title">Resume</div>
        <div class="action">View / Download</div>
      </a>

      <a class="resume-card" href="廖思彤中文简历2026.pdf" target="_blank">
        <div class="icon">📄</div>
        <div class="lang">中文</div>
        <div class="title">简历</div>
        <div class="action">查看 / 下载</div>
      </a>

    </div>
  </div>

</body>
</html>
